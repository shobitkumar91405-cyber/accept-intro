<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intro | in</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@400;700&family=Cinzel+Decorative:wght@700&display=swap');
        
        body, html {
            margin: 0; padding: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #fffdf8, #fff1f6, #f2e9ff);
            font-family: 'Playfair Display', serif;
            color: #333;
        }
        
        .premium-font { font-family: 'Dancing Script', cursive; font-weight: 700; }
        .title-font { font-family: 'Cinzel Decorative', cursive; letter-spacing: 3px; }
        
        .section {
            position: absolute; inset: 0;
            display: none; opacity: 0;
            align-items: center; justify-content: center; flex-direction: column;
            padding: 20px; width: 100vw; height: 100vh;
            text-align: center;
        }

        .section.active { display: flex; opacity: 1; }

        .glass-premium {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            border-radius: 30px;
            padding: 2rem;
            z-index: 10;
        }

        .profile-img {
            width: 180px; height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .btn-next {
            margin-top: 30px;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            color: white;
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 117, 140, 0.3);
            cursor: pointer;
        }

        .btn-next:hover { transform: scale(1.05); }

        .particle {
            position: fixed; top: -5%;
            pointer-events: none;
            animation: fall linear infinite;
        }
        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }

        /* Branding Style */
        .branding {
            position: fixed;
            top: 15px;
            width: 100%;
            text-align: center;
            z-index: 100;
            font-family: 'Cinzel Decorative', cursive;
            font-size: 10px;
            letter-spacing: 2px;
            color: rgba(0,0,0,0.4);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="branding">INSTA  @riya_badnore  💖</div>

    <audio id="bgMusic" loop>
        <source src="tere-liye.mp3" type="audio/mpeg">
    </audio>

    <div id="particles"></div>

    <section id="page1" class="section active">
        <div class="glass-premium">
            <img src="photo1.jpg" alt="Tanya" class="profile-img">
            <h1 class="text-5xl premium-font text-rose-600 mb-2">Hello, I'm</h1>
            <h2 class="text-6xl title-font text-gray-800">RIYA</h2>
            <button onclick="startExperience()" class="btn-next">Click to Enter ✨</button>
        </div>
    </section>

    <section id="page2" class="section">
        <div class="glass-premium max-w-sm w-full">
            <i class="fa-solid fa-location-dot text-4xl text-rose-500 mb-4"></i>
            <h2 class="text-4xl premium-font mb-2">I belong to</h2>
            <p class="text-5xl font-bold text-gray-800 mb-8">PUNE</p>
            
            <hr class="border-rose-100 mb-8">
            
            <i class="fa-solid fa-cake-candles text-4xl text-amber-500 mb-4"></i>
            <h2 class="text-4xl premium-font mb-2">Sweet</h2>
            <p class="text-5xl font-bold text-gray-800">19 Years Old</p>
            
            <button onclick="nextPage('page3')" class="btn-next">Next Page ➔</button>
        </div>
    </section>

    <section id="page3" class="section">
        <div class="glass-premium max-w-sm w-full">
            <div class="text-6xl mb-6">📚✏️</div>
            <h2 class="text-5xl premium-font mb-4 text-rose-600">My Hobby</h2>
            <p class="text-3xl text-gray-700 leading-relaxed italic">
                "I find peace in <span class="font-bold text-gray-900">Studying</span> and learning new things every day."
            </p>
            <button onclick="nextPage('page1')" class="btn-next">Restart ↺</button>
        </div>
    </section>

    <script>
        const audio = document.getElementById('bgMusic');

        function startExperience() {
            // Play music on first interaction
            audio.play().catch(e => console.log("Audio play error:", e));
            nextPage('page2');
        }

        function nextPage(nextId) {
            const current = document.querySelector('.section.active');
            const next = document.getElementById(nextId);

            gsap.to(current, { opacity: 0, y: -20, duration: 0.5, onComplete: () => {
                current.classList.remove('active');
                next.classList.add('active');
                gsap.fromTo(next, { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5 });
            }});
        }

        // Floating Particles
        const container = document.getElementById('particles');
        const icons = ['🌸', '✨', '📖', '💖'];
        for (let i = 0; i < 15; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = icons[Math.floor(Math.random() * icons.length)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (Math.random() * 3 + 4) + 's';
            p.style.opacity = Math.random() * 0.5 + 0.2;
            p.style.fontSize = Math.random() * 20 + 10 + 'px';
            container.appendChild(p);
        }
    </script>
</body>
</html>
