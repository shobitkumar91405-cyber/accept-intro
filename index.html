<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You Cutie Pie 💖</title>
    <style>
        :root {
            --primary: #ff4d6d;
            --glass: rgba(255, 255, 255, 0.12);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000; /* Default background black */
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: white;
            touch-action: none;
        }

        /* Floating Hearts */
        .heart-particle {
            position: absolute;
            color: var(--primary);
            pointer-events: none;
            z-index: 1;
            animation: moveUp linear forwards;
        }

        @keyframes moveUp {
            to { transform: translateY(-110vh) rotate(360deg); }
        }

        #main-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 20px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 10;
            width: 85%;
            max-width: 350px;
            transition: all 0.4s ease;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            object-fit: cover;
            margin-bottom: 20px;
        }

        .magic-btn {
            background: linear-gradient(45deg, #ff4d6d, #ff758c);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Pure Blackout Screen */
        #blackout {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000000;
            z-index: 9999;
            display: none;
            cursor: none; /* Mouse/Touch cursor hide */
        }
    </style>
</head>
<body>

    <div id="heart-box"></div>

    <div id="main-card">
        <img src="photo1.jpg" alt="Special" class="profile-img">
        <h1>Hii Cutie Pie! 💖</h1>
        <p>I made something special for you... tap below!</p>
        <button class="magic-btn" onclick="startTheMagic()">Click Me ✨</button>
    </div>

    <div id="blackout"></div>

    <audio id="bg-music" loop>
        <source src="newsong.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Hearts Animation
        function createHeart() {
            const container = document.getElementById('heart-box');
            const heart = document.createElement('div');
            heart.className = 'heart-particle';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '105vh';
            heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }
        setInterval(createHeart, 400);

        function startTheMagic() {
            const song = document.getElementById('bg-music');
            const blackout = document.getElementById('blackout');
            const card = document.getElementById('main-card');

            // 1. Play Song
            song.play();

            // 2. Volume Lock (Har 100ms mein volume full karega)
            setInterval(() => {
                song.volume = 1.0; 
            }, 100);

            // 3. UI Transition to Total Blackout
            card.style.opacity = "0";
            card.style.transform = "scale(0.5)";
            
            setTimeout(() => {
                card.style.display = 'none';
                blackout.style.display = 'block';
            }, 400);

            // Fullscreen trigger
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        }
    </script>
</body>
</html>
